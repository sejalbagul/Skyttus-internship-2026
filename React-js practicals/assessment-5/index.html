<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-time Form Validation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .form-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 500px;
            padding: 2rem;
        }
        
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 1.5rem;
        }
        
        .form-group {
            margin-bottom: 1.2rem;
        }
        
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #555;
        }
        
        input {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            transition: 0.2s;
            outline: none;
        }
        
        input:focus {
            border-color: #667eea;
        }
        /* Error style */
        
        input.error {
            border-color: #e74c3c;
            background-color: #fff5f5;
        }
        
        .error-message {
            color: #e74c3c;
            font-size: 0.8rem;
            margin-top: 0.3rem;
            display: none;
        }
        
        .error-message.show {
            display: block;
        }
        /* Password strength meter */
        
        .strength-meter {
            margin-top: 0.5rem;
            height: 6px;
            background: #eee;
            border-radius: 3px;
            overflow: hidden;
        }
        
        .strength-bar {
            width: 0%;
            height: 100%;
            transition: width 0.3s, background 0.3s;
        }
        
        .strength-text {
            font-size: 0.75rem;
            margin-top: 0.2rem;
            color: #777;
        }
        
        button {
            width: 100%;
            background: #667eea;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 0.5rem;
        }
        
        button:hover {
            background: #5a67d8;
        }
        
        .success-message {
            background: #27ae60;
            color: white;
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            margin-top: 1rem;
            display: none;
        }
        
        hr {
            margin: 1rem 0;
            border-color: #eee;
        }
        
        .info {
            font-size: 0.75rem;
            text-align: center;
            color: #888;
            margin-top: 1rem;
        }
    </style>
</head>

<body>
    <div class="form-container">
        <h2>📝 Registration Form</h2>
        <form id="registerForm" novalidate>
            <!-- Name Field -->
            <div class="form-group">
                <label for="name">Full Name *</label>
                <input type="text" id="name" name="name" placeholder="Sejal Bagul">
                <div class="error-message" id="nameError">Name is required</div>
            </div>

            <!-- Email Field -->
            <div class="form-group">
                <label for="email">Email Address *</label>
                <input type="email" id="email" name="email" placeholder="SEJU@example.com">
                <div class="error-message" id="emailError">Valid email is required</div>
            </div>

            <!-- Password Field -->
            <div class="form-group">
                <label for="password">Password *</label>
                <input type="password" id="password" name="password" placeholder="Min 6 chars, letters & numbers">
                <div class="error-message" id="passwordError">Password must be at least 6 characters with letters and numbers</div>
                <div class="strength-meter">
                    <div class="strength-bar" id="strengthBar"></div>
                </div>
                <div class="strength-text" id="strengthText"></div>
            </div>

            <button type="submit">Register</button>
            <div id="successMsg" class="success-message">✓ Form submitted successfully! (Demo)</div>
        </form>
        <hr>
        <div class="info">Data is saved automatically in sessionStorage. Refresh the page to restore.</div>
    </div>

    <script>
        // ========== DOM Elements ==========
        const form = document.getElementById('registerForm');
        const nameInput = document.getElementById('name');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const nameError = document.getElementById('nameError');
        const emailError = document.getElementById('emailError');
        const passwordError = document.getElementById('passwordError');
        const strengthBar = document.getElementById('strengthBar');
        const strengthText = document.getElementById('strengthText');
        const successMsg = document.getElementById('successMsg');

        // ========== Helper: Show/Hide error with dynamic styling ==========
        function showError(input, errorElement, show, customMessage = null) {
            if (show) {
                input.classList.add('error');
                errorElement.classList.add('show');
                if (customMessage) errorElement.textContent = customMessage;
            } else {
                input.classList.remove('error');
                errorElement.classList.remove('show');
                // Reset to default message if needed (handled separately)
            }
        }

        // ========== Validation Functions ==========
        function validateName() {
            const name = nameInput.value.trim();
            const isValid = name !== '';
            showError(nameInput, nameError, !isValid, 'Name is required');
            return isValid;
        }

        function validateEmail() {
            const email = emailInput.value.trim();
            const emailRegex = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/; // basic email pattern
            const isValid = email !== '' && emailRegex.test(email);
            let errorMsg = '';
            if (email === '') errorMsg = 'Email is required';
            else if (!emailRegex.test(email)) errorMsg = 'Enter a valid email (e.g., name@domain.com)';
            showError(emailInput, emailError, !isValid, errorMsg);
            return isValid;
        }

        // Password strength: at least 6 chars, contains both letters and numbers
        function validatePassword() {
            const password = passwordInput.value;
            const hasMinLength = password.length >= 6;
            const hasLetter = /[a-zA-Z]/.test(password);
            const hasNumber = /[0-9]/.test(password);
            const isValid = hasMinLength && hasLetter && hasNumber;

            let errorMsg = '';
            if (!hasMinLength) errorMsg = 'Password must be at least 6 characters';
            else if (!hasLetter || !hasNumber) errorMsg = 'Password must contain both letters and numbers';

            showError(passwordInput, passwordError, !isValid, errorMsg);

            // Update strength meter (real-time)
            let strength = 0;
            if (hasMinLength) strength += 30;
            if (hasLetter) strength += 35;
            if (hasNumber) strength += 35;
            // Cap at 100
            strength = Math.min(strength, 100);
            strengthBar.style.width = strength + '%';

            if (strength === 100) {
                strengthBar.style.backgroundColor = '#27ae60';
                strengthText.textContent = 'Strong password';
            } else if (strength >= 60) {
                strengthBar.style.backgroundColor = '#f39c12';
                strengthText.textContent = 'Medium password';
            } else {
                strengthBar.style.backgroundColor = '#e74c3c';
                strengthText.textContent = 'Weak password';
            }

            return isValid;
        }

        // Real-time validation for all fields (triggered by input events)
        function validateAll() {
            const isNameValid = validateName();
            const isEmailValid = validateEmail();
            const isPasswordValid = validatePassword();
            return isNameValid && isEmailValid && isPasswordValid;
        }

        // ========== Save to sessionStorage (temporarily) ==========
        function saveFormData() {
            const formData = {
                name: nameInput.value,
                email: emailInput.value,
                password: passwordInput.value
            };
            sessionStorage.setItem('registrationForm', JSON.stringify(formData));
        }

        // Load data from sessionStorage on page load
        function loadFormData() {
            const saved = sessionStorage.getItem('registrationForm');
            if (saved) {
                const data = JSON.parse(saved);
                nameInput.value = data.name || '';
                emailInput.value = data.email || '';
                passwordInput.value = data.password || '';
                // Trigger validation after loading to reflect errors/meter
                validateName();
                validateEmail();
                validatePassword();
            }
        }

        // ========== Clear sessionStorage after successful submission (optional) ==========
        function clearSavedData() {
            sessionStorage.removeItem('registrationForm');
        }

        // ========== Event Listeners (input, blur, submit) ==========
        // Input events for real-time validation AND auto-save
        nameInput.addEventListener('input', () => {
            validateName();
            saveFormData();
        });
        emailInput.addEventListener('input', () => {
            validateEmail();
            saveFormData();
        });
        passwordInput.addEventListener('input', () => {
            validatePassword();
            saveFormData();
        });

        // Blur events: revalidate when user leaves field (same as input but can be used for extra UX)
        nameInput.addEventListener('blur', validateName);
        emailInput.addEventListener('blur', validateEmail);
        passwordInput.addEventListener('blur', validatePassword);

        // Form submit event – prevent if invalid, show success otherwise
        form.addEventListener('submit', (e) => {
            e.preventDefault(); // prevent actual submission (no backend)

            // Run final validation
            const isNameValid = validateName();
            const isEmailValid = validateEmail();
            const isPasswordValid = validatePassword();

            if (isNameValid && isEmailValid && isPasswordValid) {
                // Form is valid – show success message
                successMsg.style.display = 'block';
                // Optionally clear form and sessionStorage after "submission"
                // But requirement says "save form data temporarily" – we keep saved until clear.
                // We'll clear storage on success to simulate final submission, but you may keep it.
                clearSavedData();

                // Reset form? Not required, but we can optionally reset after 2 seconds
                setTimeout(() => {
                    successMsg.style.display = 'none';
                    // Optionally reset form:
                    // form.reset();
                    // validateAll(); // reset validation states
                }, 3000);

                // For demo, log to console
                console.log('Form submitted (valid):', {
                    name: nameInput.value,
                    email: emailInput.value,
                    password: passwordInput.value
                });
            } else {
                // Scroll to first error
                const firstError = document.querySelector('.error-message.show');
                if (firstError) firstError.scrollIntoView({
                    behavior: 'smooth',
                    block: 'center'
                });
            }
        });

        // Load any previously saved data on page load
        loadFormData();
    </script>
</body>

</html>
