<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App | Real-time Forecast</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #2c3e50, #3498db);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .weather-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 500px;
            overflow: hidden;
            transition: 0.3s;
            backdrop-filter: blur(5px);
        }
        
        .header {
            background: #2980b9;
            color: white;
            padding: 1.5rem;
            text-align: center;
        }
        
        .header h1 {
            font-size: 1.8rem;
        }
        
        .search-section {
            padding: 1.5rem;
            background: #ecf0f1;
            border-bottom: 1px solid #bdc3c7;
        }
        
        .input-group {
            display: flex;
            gap: 10px;
        }
        
        .input-group input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #bdc3c7;
            border-radius: 25px;
            font-size: 1rem;
            outline: none;
            transition: 0.2s;
        }
        
        .input-group input:focus {
            border-color: #2980b9;
        }
        
        .input-group button {
            background: #2980b9;
            color: white;
            border: none;
            padding: 0 25px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        
        .input-group button:hover {
            background: #1f6392;
        }
        /* Loading spinner */
        
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #2980b9;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }
        /* Error message */
        
        .error-message {
            background: #e74c3c;
            color: white;
            padding: 10px;
            border-radius: 8px;
            margin: 15px 20px;
            text-align: center;
            display: none;
        }
        /* Weather display card */
        
        .weather-info {
            padding: 1.5rem;
            display: none;
        }
        
        .city-name {
            font-size: 2rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 0.5rem;
            color: #2c3e50;
        }
        
        .date-time {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 1.5rem;
        }
        
        .temp-section {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 1.5rem;
        }
        
        .temp {
            font-size: 4rem;
            font-weight: bold;
            color: #e67e22;
        }
        
        .weather-icon {
            font-size: 4rem;
        }
        
        .details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 1rem;
        }
        
        .detail-card {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 15px;
            text-align: center;
        }
        
        .detail-label {
            font-size: 0.8rem;
            color: #7f8c8d;
            text-transform: uppercase;
        }
        
        .detail-value {
            font-size: 1.2rem;
            font-weight: bold;
            color: #2c3e50;
        }
        
        .footer {
            text-align: center;
            padding: 1rem;
            font-size: 0.7rem;
            color: #95a5a6;
            background: #ecf0f1;
        }
        
        @media (max-width: 480px) {
            .input-group {
                flex-direction: column;
            }
            .temp {
                font-size: 2.5rem;
            }
        }
    </style>
</head>

<body>
    <div class="weather-container">
        <div class="header">
            <h1>🌤️ Weather Now</h1>
        </div>

        <div class="search-section">
            <div class="input-group">
                <input type="text" id="cityInput" placeholder="Enter city name, e.g., London, Delhi" value="New York">
                <button id="searchBtn">🔍 Search</button>
            </div>
        </div>

        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Fetching weather data...</p>
        </div>

        <div id="errorMsg" class="error-message"></div>

        <div id="weatherInfo" class="weather-info">
            <div class="city-name" id="cityName"></div>
            <div class="date-time" id="dateTime"></div>
            <div class="temp-section">
                <span class="temp" id="temperature"></span>
                <span class="weather-icon" id="weatherIcon"></span>
            </div>
            <div class="details">
                <div class="detail-card">
                    <div class="detail-label">Humidity</div>
                    <div class="detail-value" id="humidity">--%</div>
                </div>
                <div class="detail-card">
                    <div class="detail-label">Wind Speed</div>
                    <div class="detail-value" id="wind">-- km/h</div>
                </div>
                <div class="detail-card">
                    <div class="detail-label">Pressure</div>
                    <div class="detail-value" id="pressure">-- hPa</div>
                </div>
                <div class="detail-card">
                    <div class="detail-label">Condition</div>
                    <div class="detail-value" id="condition">--</div>
                </div>
            </div>
        </div>

        <div class="footer">
            Powered by OpenWeatherMap | Real-time data
        </div>
    </div>

    <script>
        // ==================== CONFIGURATION ====================
        // 🔑 IMPORTANT: Replace this with your own OpenWeatherMap API key
        // Get a free key at https://openweathermap.org/api
        const API_KEY = 'YOUR_API_KEY_HERE'; // <-- PUT YOUR API KEY HERE

        // Base URL for current weather data
        const BASE_URL = 'https://api.openweathermap.org/data/2.5/weather';

        // ==================== DOM Elements ====================
        const cityInput = document.getElementById('cityInput');
        const searchBtn = document.getElementById('searchBtn');
        const loadingDiv = document.getElementById('loading');
        const errorMsgDiv = document.getElementById('errorMsg');
        const weatherInfoDiv = document.getElementById('weatherInfo');

        // Elements to update dynamically
        const cityNameSpan = document.getElementById('cityName');
        const dateTimeSpan = document.getElementById('dateTime');
        const temperatureSpan = document.getElementById('temperature');
        const weatherIconSpan = document.getElementById('weatherIcon');
        const humiditySpan = document.getElementById('humidity');
        const windSpan = document.getElementById('wind');
        const pressureSpan = document.getElementById('pressure');
        const conditionSpan = document.getElementById('condition');

        // ==================== Helper Functions ====================

        // Show/hide loading state
        function showLoading(show) {
            loadingDiv.style.display = show ? 'block' : 'none';
        }

        // Show error message (user-friendly)
        function showError(message) {
            errorMsgDiv.textContent = message;
            errorMsgDiv.style.display = 'block';
            weatherInfoDiv.style.display = 'none';
            // Auto hide after 4 seconds
            setTimeout(() => {
                errorMsgDiv.style.display = 'none';
            }, 4000);
        }

        // Hide error
        function hideError() {
            errorMsgDiv.style.display = 'none';
        }

        // Format date & time from Unix timestamp + timezone offset
        function formatDateTime(timestamp, timezoneOffset) {
            const date = new Date((timestamp + timezoneOffset) * 1000);
            const options = {
                weekday: 'short',
                year: 'numeric',
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            };
            return date.toLocaleString('en-US', options);
        }

        // Get weather emoji based on condition code
        function getWeatherIcon(weatherCode) {
            // Map OpenWeatherMap condition codes to emoji
            if (weatherCode >= 200 && weatherCode < 300) return '⛈️';
            if (weatherCode >= 300 && weatherCode < 400) return '🌧️';
            if (weatherCode >= 500 && weatherCode < 600) return '🌧️';
            if (weatherCode >= 600 && weatherCode < 700) return '❄️';
            if (weatherCode >= 700 && weatherCode < 800) return '🌫️';
            if (weatherCode === 800) return '☀️';
            if (weatherCode === 801) return '🌤️';
            if (weatherCode === 802) return '⛅';
            if (weatherCode === 803 || weatherCode === 804) return '☁️';
            return '🌡️';
        }

        // ==================== Main Fetch Function (async/await) ====================
        async function fetchWeather(city) {
            // Hide previous error and weather display
            hideError();
            weatherInfoDiv.style.display = 'none';

            // Validate input
            if (!city || city.trim() === '') {
                showError('❌ Please enter a city name.');
                return;
            }

            // Show loading spinner
            showLoading(true);

            try {
                // Build URL with query parameters
                const url = `${BASE_URL}?q=${encodeURIComponent(city)}&appid=${API_KEY}&units=metric`;

                // Use Fetch API (returns Promise)
                const response = await fetch(url);

                // Check if response is OK (status 200-299)
                if (!response.ok) {
                    // Handle HTTP errors (e.g., 404 city not found, 401 invalid key)
                    if (response.status === 404) {
                        throw new Error(`City "${city}" not found. Please check the name.`);
                    } else if (response.status === 401) {
                        throw new Error('Invalid API key. Please get a valid key from OpenWeatherMap.');
                    } else {
                        throw new Error(`Server error (${response.status}). Try again later.`);
                    }
                }

                // Parse JSON response
                const data = await response.json();

                // Extract required data
                const {
                    name,
                    sys,
                    main,
                    weather,
                    wind,
                    dt,
                    timezone
                } = data;
                const country = sys.country;
                const temperature = Math.round(main.temp);
                const humidity = main.humidity;
                const pressure = main.pressure;
                const windSpeed = (wind.speed * 3.6).toFixed(1); // convert m/s to km/h
                const condition = weather[0].description;
                const weatherId = weather[0].id;
                const iconEmoji = getWeatherIcon(weatherId);

                // Format date/time based on city timezone
                const formattedDateTime = formatDateTime(dt, timezone);

                // Update DOM
                cityNameSpan.textContent = `${name}, ${country}`;
                dateTimeSpan.textContent = formattedDateTime;
                temperatureSpan.textContent = `${temperature}°C`;
                weatherIconSpan.textContent = iconEmoji;
                humiditySpan.textContent = `${humidity}%`;
                windSpan.textContent = `${windSpeed} km/h`;
                pressureSpan.textContent = `${pressure} hPa`;
                conditionSpan.textContent = condition.charAt(0).toUpperCase() + condition.slice(1);

                // Show weather info
                weatherInfoDiv.style.display = 'block';

            } catch (error) {
                // Handle any errors (network, invalid city, etc.)
                console.error('Weather fetch error:', error);
                showError(error.message || '⚠️ Failed to fetch weather. Check your connection or API key.');
            } finally {
                // Always hide loading spinner
                showLoading(false);
            }
        }

        // ==================== Event Listeners ====================
        searchBtn.addEventListener('click', () => {
            fetchWeather(cityInput.value);
        });

        // Allow pressing Enter in input field
        cityInput.addEventListener('keypress', (event) => {
            if (event.key === 'Enter') {
                fetchWeather(cityInput.value);
            }
        });

        // ==================== Initial Load ====================
        // Fetch weather for a default city on page load (e.g., New York)
        // The input field already has "New York" as value
        fetchWeather(cityInput.value);
    </script>
</body>

</html>
